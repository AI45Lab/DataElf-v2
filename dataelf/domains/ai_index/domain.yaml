domain: ai_index
display_name: AI 科技情报

entities:
  Paper:
    table: papers
    id_field: paper_id
    name_field: title
  Institution:
    table: institutions
    id_field: institution_id
    name_field: name
  Scholar:
    table: scholars
    id_field: scholar_id
    name_field: display_name
  FundingEvent:
    table: funding
    id_field: funding_id
    name_field: title

relations:
  Paper.AUTHORED_BY.Scholar:
    table: paper_author
    source_field: paper_id
    target_field: scholar_id
  Paper.AFFILIATED_WITH.Institution:
    table: paper_institution
    source_field: paper_id
    target_field: institution_id
  Scholar.AFFILIATED_WITH.Institution:
    table: scholar_institution
    source_field: scholar_id
    target_field: institution_id
  Paper.YEARLY_METRIC:
    table: paper_yearly_counts
    source_field: paper_id
    target_field: year
  Scholar.YEARLY_METRIC:
    table: scholar_yearly_counts
    source_field: scholar_id
    target_field: year
  Institution.HAS_VENUE:
    table: institution_venues
    source_field: institution_id
    target_field: venue_name
  Scholar.HAS_VENUE:
    table: scholar_venues
    source_field: scholar_id
    target_field: venue_name
  Institution.HAS_FUNDING_ROUND:
    table: funding_rounds
    source_field: institution_id
    target_field: funding_id

tools:
  - search_papers
  - search_scholars
  - search_institutions
  - fetch_institution_funding

workspace_tables:
  - papers.csv
  - paper_author.csv
  - paper_institution.csv
  - paper_yearly_counts.csv
  - paper_awards.csv
  - institutions.csv
  - institution_awards.csv
  - institution_venues.csv
  - scholars.csv
  - scholar_institution.csv
  - scholar_yearly_counts.csv
  - scholar_awards.csv
  - scholar_venues.csv
  - funding.csv
  - funding_summary.csv
  - funding_rounds.csv
  - funding_investors.csv
  - institution_investments.csv
  - source_observations.csv
  - external_findings.csv

default_discovery_strategies:
  - topic_growth
  - institution_ranking_jump
  - citation_velocity
  - benchmark_emergence
  - scholar_activity_shift
  - cross_source_signal
